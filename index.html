<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Renaud Games</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter, sans-serif;background:#0a0a0a;color:#fff}
header{padding:20px;text-align:center;font-size:28px;font-weight:700;background:#111;border-bottom:1px solid #222}
nav{display:flex;gap:10px;justify-content:center;padding:10px;flex-wrap:wrap}
nav button{padding:10px 15px;background:#1a1a1a;border:none;color:#fff;border-radius:10px;cursor:pointer}
nav button:hover{background:#ff0000}
.container{padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}
.card{background:#111;border-radius:15px;overflow:hidden;transition:.3s;cursor:pointer}
.card:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(255,0,0,0.5)}
.card img{width:100%;height:140px;object-fit:cover}
.card h3{padding:10px;font-size:16px}
#gameFrame{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;flex-direction:column}
#gameFrame iframe{flex:1;border:none}
#closeBtn{padding:10px;background:red;color:#fff;text-align:center;cursor:pointer}
</style>
</head>
<body>
<header>🎮 RENAUD GAMES</header>

<nav>
<button onclick="filter('all')">Tous</button>
<button onclick="filter('action')">Action</button>
<button onclick="filter('reflexion')">Réflexion</button>
<button onclick="filter('mots')">Mots Croisés</button>
<button onclick="filter('course')">Course</button>
</nav>

<div class="container">
<div class="grid" id="games"></div>
</div>

<div id="gameFrame">
<div id="closeBtn" onclick="closeGame()">❌ Quitter</div>
<iframe id="frame"></iframe>
</div>

<script>
const games = [
{title:"Snake",cat:"action",img:"https://picsum.photos/300/200?1",url:"https://playsnake.org/"},
{title:"2048",cat:"reflexion",img:"https://picsum.photos/300/200?2",url:"https://play2048.co/"},
{title:"Mots Croisés",cat:"mots",img:"https://picsum.photos/300/200?3",url:"https://www.lexisrex.com/Francais/Mots-Croises"},
{title:"Moto X3M",cat:"course",img:"https://picsum.photos/300/200?4",url:"https://www.crazygames.com/game/moto-x3m"}
]

function render(list){
const container=document.getElementById('games')
container.innerHTML=""
list.forEach(g=>{
const div=document.createElement('div')
div.className='card'
div.innerHTML=`<img src="${g.img}"><h3>${g.title}</h3>`
div.onclick=()=>openGame(g.url)
container.appendChild(div)
})
}

function filter(cat){
if(cat==='all') return render(games)
render(games.filter(g=>g.cat===cat))
}

function openGame(url){
document.getElementById('gameFrame').style.display='flex'
document.getElementById('frame').src=url
}

function closeGame(){
document.getElementById('gameFrame').style.display='none'
document.getElementById('frame').src=""
}

render(games)
</script>

</body>
</html>
