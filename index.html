<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Renaud Games - Version Fonctionnelle</title>
<style>
body{font-family:Arial;background:#0a0a0a;color:white;margin:0}
header{text-align:center;padding:20px;background:#111;font-size:24px}
.container{padding:20px}
button{padding:10px 15px;margin:5px;border:none;background:#ff0000;color:white;cursor:pointer}
iframe{width:100%;height:500px;border:none;margin-top:20px}
</style>
</head>
<body>
<header>🎮 RENAUD GAMES (VERSION STABLE)</header>

<div class="container">
<h2>🧠 Mots Croisés (IMPORTANT PROF)</h2>
<button onclick="loadGame('https://www.lexisrex.com/Francais/Mots-Croises')">Lancer Mots Croisés</button>

<h2>🎮 Jeux bonus</h2>
<button onclick="loadGame('https://playsnake.org/')">Snake</button>
<button onclick="loadGame('https://play2048.co/')">2048</button>

<iframe id="game"></iframe>
</div>

<script>
function loadGame(url){
 document.getElementById('game').src = url;
}
</script>

</body>
</html>
